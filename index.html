<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Evita que el usuario haga zoom con los dedos en el navegador del celular -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Proyecto AR - Seoane</title>

    <!-- Librerías de A-Frame y AR.js -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <style>
      /* Fuerza a que el lienzo de la cámara ocupe exactamente la pantalla del celular */
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed; /* Evita rebotes de scroll en Safari / iOS */
      }
      
      /* Corrige el deformamiento del video en pantallas verticales */
      #arjs-video {
        object-fit: cover !important;
        width: 100vw !important;
        height: 100vh !important;
        margin: 0 !important;
      }
    </style>
  </head>

  <body>
    <!-- Configuración optimizada de renderizado para móviles -->
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      renderer="logarithmicDepthBuffer: true; colorManagement: true;">
      
      <!-- Carga de tu modelo 3D -->
      <a-assets>
        <a-asset-item id="miModelo" src="proyecto_seoane.glb"></a-asset-item>
      </a-assets>

      <!-- Marcador Hiro -->
      <a-marker preset="hiro">
        <!-- 
           TIP DE ESCALA: Si en el celular ves que el objeto es inmenso o microscópico,
           solo cambia el valor de 'scale' (ej. 0.2 0.2 0.2 ó 1 1 1).
        -->
        <a-entity 
          gltf-model="#miModelo" 
          animation-mixer
          scale="0.5 0.5 0.5" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>
      </a-marker>

      <!-- Cámara A-Frame -->
      <a-entity camera></a-entity>

    </a-scene>
  </body>
</html>
