<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AR Seoane</title>

  <!-- Librerías -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%;
      overflow: hidden;
      background: black;
    }
    /* Forzar el vídeo a toda la pantalla sin bordes negros */
    .a-arjs-video, video.a-arjs-video, #arjs-video, video {
      object-fit: cover !important;
      width: 100vw !important;
      height: 100vh !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      margin: 0 !important;
      z-index: 0 !important;
    }
    /* Overlay de inicio */
    #startOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 999;
      cursor: pointer;
      text-align: center;
      padding: 20px;
    }
    #startOverlay h1 { font-size: 2.5rem; margin: 0; }
    #startOverlay p { font-size: 1.2rem; margin: 10px 0 20px; opacity: 0.8; }
    #startOverlay .btn {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.5rem;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    #startOverlay .btn:active { transform: scale(0.95); }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="startOverlay">
    <h1>📱 AR</h1>
    <p>Proyecto Seoane</p>
    <button class="btn" id="startBtn">▶ Iniciar</button>
  </div>

  <a-scene
    id="scene"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="antialias: true; colorManagement: true;"
  >
    <a-assets>
      <a-asset-item id="miModelo" src="proyecto_seoane.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro">
      <a-entity
        gltf-model="#miModelo"
        animation-mixer
        scale="0.4 0.4 0.4"
        position="0 0 0"
        rotation="-90 0 0"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    (function() {
      const overlay = document.getElementById('startOverlay');
      const startBtn = document.getElementById('startBtn');
      const scene = document.getElementById('scene');

      function startAR() {
        overlay.classList.add('hidden');
        if (scene.components && scene.components['arjs']) {
          scene.components['arjs'].play();
        } else {
          scene.play();
        }
        // Forzar ajuste del vídeo después de iniciar
        setTimeout(function() {
          const videos = document.querySelectorAll('video');
          videos.forEach(v => {
            v.style.objectFit = 'cover';
            v.style.width = '100vw';
            v.style.height = '100vh';
            v.style.position = 'fixed';
            v.style.top = '0';
            v.style.left = '0';
            v.style.margin = '0';
          });
        }, 500);
      }

      startBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        startAR();
      });

      overlay.addEventListener('click', function(e) {
        if (e.target !== startBtn) {
          startAR();
        }
      });
    })();
  </script>
</body>
</html>
