<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <!-- Meta obligatorio para quitar zoom y ajustar a pantalla -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Hiro - Práctica Final</title>

    <style>
        /* Reseteo total para eliminar márgenes y scrolls */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: black;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* --- SOLUCIÓN DEFINITIVA PARA LA CÁMARA --- */
        /* Forzamos el vídeo a cubrir toda la pantalla SIN bordes negros */
        video {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important; /* <-- La clave: recorta los extremos para llenar */
            z-index: 0;
            display: block !important;
        }

        /* Forzamos el canvas de AR (donde se dibujan los objetos 3D) a ocupar todo */
        canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            display: block !important;
            z-index: 1;
            /* El canvas debe ser transparente para ver el vídeo detrás */
            background: transparent !important;
        }

        /* Override específico para el canvas interno de A-Frame */
        .a-canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
        }

        /* Oculta el loader feo de AR.js si aparece */
        .arjs-loader {
            display: none !important;
        }
    </style>

    <!-- Librerías necesarias -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.4/aframe/build/aframe-ar.min.js"></script>
</head>
<body>

    <!-- 
        ESCENA AR CORREGIDA:
        - 'embedded' para que no abra pantalla completa por defecto.
        - 'videoTexture: true' -> obliga a usar textura de vídeo en lugar de renderizado en pantalla, 
          eliminando el desajuste de tamaño que causaba la franja negra.
    -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        renderer="antialias: true"
        vr-mode-ui="enabled: false"
    >
        
        <!-- Marcador Hiro (el clásico) -->
        <a-marker preset="hiro">
            <!-- Pon aquí tus objetos 3D (ejemplo: un cubo flotante) -->
            <a-box position="0 0.5 0" material="color: #00aaff;" rotation="0 45 0" scale="0.5 0.5 0.5"></a-box>
            <a-sphere position="0.5 0.5 0" radius="0.25" color="#ffaa00"></a-sphere>
        </a-marker>

        <!-- Cámara obligatoria para AR -->
        <a-entity camera></a-entity>

    </a-scene>

    <!-- 
        SCRIPT DE RESCATE: Si por algún motivo el canvas se queda con un tamaño extraño 
        al girar el móvil, esto lo reajusta automáticamente.
    -->
    <script>
        (function() {
            function forceFullScreen() {
                const videos = document.querySelectorAll('video');
                const canvases = document.querySelectorAll('canvas');
                
                videos.forEach(v => {
                    v.style.width = '100vw';
                    v.style.height = '100vh';
                    v.style.objectFit = 'cover';
                });
                
                canvases.forEach(c => {
                    // Solo ajustamos los canvases de AR, no otros
                    if (c.width > 100 || c.height > 100) {
                        c.style.width = '100vw';
                        c.style.height = '100vh';
                    }
                });
            }

            // Ejecutar al cargar, al redimensionar y al girar la pantalla
            window.addEventListener('load', forceFullScreen);
            window.addEventListener('resize', forceFullScreen);
            window.addEventListener('orientationchange', function() {
                setTimeout(forceFullScreen, 300);
            });

            // Observador para cuando AR.js cree el vídeo dinámicamente
            const observer = new MutationObserver(forceFullScreen);
            observer.observe(document.body, { childList: true, subtree: true });

            console.log('✅ Corrección de bordes negros aplicada correctamente.');
        })();
    </script>

</body>
</html>
