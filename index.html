<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Proyecto AR - Seoane</title>

  <!-- Librerías -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    /* Reset y fullscreen */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      background: black;
    }

    /* Forzar que el vídeo de la cámara ocupe toda la pantalla */
    #arjs-video, .a-arjs-video {
      object-fit: cover !important;
      width: 100vw !important;
      height: 100vh !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      z-index: 0 !important;
    }

    /* Overlay de inicio */
    #start-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      color: white;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
      cursor: pointer;
    }
    #start-overlay h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      font-weight: 300;
    }
    #start-overlay p {
      font-size: 1.1rem;
      opacity: 0.8;
      max-width: 300px;
      margin: 0.5rem 0 1.5rem;
    }
    #start-overlay .btn {
      background: #4CAF50;
      border: none;
      color: white;
      padding: 16px 40px;
      font-size: 1.3rem;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s;
      font-weight: bold;
    }
    #start-overlay .btn:active {
      transform: scale(0.94);
    }

    .hidden {
      display: none !important;
    }

    #loading {
      position: fixed;
      bottom: 30px;
      left: 0;
      width: 100%;
      text-align: center;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      z-index: 10;
      font-size: 0.9rem;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <!-- Overlay de inicio -->
  <div id="start-overlay">
    <h1>📱 Realidad Aumentada</h1>
    <p>Proyecto Seoane</p>
    <button class="btn" id="start-btn">▶ Iniciar Cámara</button>
  </div>

  <div id="loading" class="hidden">⏳ Cargando cámara...</div>

  <!-- Escena AR -->
  <a-scene
    id="arScene"
    embedded
    arjs="
      sourceType: webcam;
      debugUIEnabled: false;
      detectionMode: mono_and_matrix;
      matrixCodeType: 3x3;
      resolution: 640x480;
    "
    renderer="
      antialias: true;
      colorManagement: true;
      logarithmicDepthBuffer: true;
    "
  >

    <!-- Carga del modelo -->
    <a-assets>
      <a-asset-item id="miModelo" src="proyecto_seoane.glb"></a-asset-item>
    </a-assets>

    <!-- Marcador Hiro -->
    <a-marker preset="hiro">
      <a-entity
        gltf-model="#miModelo"
        animation-mixer
        scale="0.35 0.35 0.35"
        position="0 0 0"
        rotation="-90 0 0"
      ></a-entity>
    </a-marker>

    <!-- Cámara -->
    <a-entity camera></a-entity>

  </a-scene>

  <script>
    (function() {
      const overlay = document.getElementById('start-overlay');
      const startBtn = document.getElementById('start-btn');
      const loading = document.getElementById('loading');
      const scene = document.getElementById('arScene');

      function iniciarAR() {
        overlay.classList.add('hidden');
        loading.classList.remove('hidden');

        // Forzar el inicio de AR.js
        if (scene.components && scene.components['arjs']) {
          scene.components['arjs'].play();
        }

        // Ocultar mensaje de carga tras unos segundos
        setTimeout(() => {
          loading.classList.add('hidden');
        }, 3000);
      }

      startBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        iniciarAR();
      });

      overlay.addEventListener('click', (e) => {
        if (e.target !== startBtn) {
          iniciarAR();
        }
      });
    })();
  </script>

</body>
</html>
